        <Style>
        #tabla_2 {
    width: 100%;
}
.img_galeria {
    width: 100%;
    height: auto;
}
        .filtro_grises {
    min-width: 0px;
    filter: grayscale(100%);
}
        .filtro_contrast {
    filter: contrast(120%);
}
        .filtro_blur {
    filter: blur(2px);
}
        .filtro_invert {
    filter: invert(100%);
}
        .filtro_opacidad {
    filter: opacity(0.5);
}
        .filtro_sombra {
    filter: drop-shadow(8px 8px 10px black);
}
        .filtro_brillo {
    filter: brightness(50%);
}
        .filter_sepia {
    filter: sepia(75%);
}
        </Style>
	</head>
